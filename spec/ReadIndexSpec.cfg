\* TLC Model Checking Configuration for ReadIndexSpec.
\*
\* Closes SPEC-GAP-4 / R-14b / PA-5023.
\*
\* Parameters chosen for tractable checking:
\*   - 3 nodes (minimum for meaningful quorum)
\*   - MaxTerm = 2 (enough for stale-leader scenarios)
\*   - MaxIndex = 2 (enough for read-after-commit + stale-read scenarios)
\*
\* Verified 2026-04-17 on Java 25 / TLC 2026.04.09: 12.4M states generated,
\* 2.27M distinct, depth 38, ~58s on 2 cores. All five invariants PASS.

CONSTANTS
    Nodes    = {n1, n2, n3}
    MaxTerm  = 2
    MaxIndex = 2

INIT Init
NEXT Next

\* Bounded model — boundary deadlock is expected, not a bug.
CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    ElectionSafety
    ReadIndexBoundedByMaxIndex
    ReadFreshness
    NoStaleLeaderServe
