\* TLC Model Checking Configuration for SnapshotInstallSpec.
\*
\* Closes SPEC-GAP-6 / PA-5027.
\*
\* Parameters chosen for tractable checking:
\*   - 3 nodes
\*   - MaxTerm = 3
\*   - MaxIndex = 4 (enough for snapshot-of-snapshot scenarios)
\*
\* Verified 2026-04-17 on Java 25 / TLC 2026.04.09: 6.0M states generated,
\* 847K distinct, depth 14, ~21s on 2 cores. All five invariants PASS.

CONSTANTS
    Nodes    = {n1, n2, n3}
    MaxTerm  = 3
    MaxIndex = 4

INIT Init
NEXT Next

CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    SnapshotBoundedByCommitted
    SnapshotMatching
    NoCommitRevert
    InflightTermMonotonic
