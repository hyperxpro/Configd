\* TLC Model Checking Configuration for ConsensusSpec
\*
\* Model parameters sized for tractable checking of joint consensus:
\*   - 3 nodes: minimum for meaningful quorum behavior (majority = 2)
\*   - MaxTerm = 3: enough to cover leader changes and re-elections
\*   - MaxLogLen = 3: enough for no-op + joint + final entries
\*   - 2 values: sufficient for distinguishing writes
\*
\* State space: ~13.8M states, ~3.3M distinct (verified in ~4 min on 2 cores).
\* For larger explorations, use Apalache with symmetry reduction.

CONSTANTS
    Nodes = {n1, n2, n3}
    MaxTerm = 3
    MaxLogLen = 3
    Values = {v1, v2}

INIT Init

NEXT Next

\* Deadlock at model bounds (MaxTerm/MaxLogLen reached) is expected, not a bug.
CHECK_DEADLOCK FALSE

INVARIANTS
    TypeOK
    ElectionSafety
    StateMachineSafety
    LeaderCompleteness
    LogMatching
    VersionMonotonicity
    ReconfigSafety
    SingleServerInvariant
    NoOpBeforeReconfig

\* F-V2-01: Removed NoStaleOverwrite — it was identical to StateMachineSafety.
\* Added LeaderCompleteness and VersionMonotonicity (strengthened) instead.

\* Liveness properties require the SPECIFICATION directive with fairness.
\* Uncomment the block below AND comment out the INIT/NEXT lines above
\* to check liveness (substantially slower — expect 10x+ runtime):
\* SPECIFICATION Spec
\* PROPERTIES
\*     EdgePropagationLiveness

\* Symmetry reduction: nodes and values are interchangeable.
\* Uncomment if TLC supports symmetry sets for your model:
\* SYMMETRY
\*     Permutations(Nodes) \union Permutations(Values)
